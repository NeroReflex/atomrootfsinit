name: Release

on:
  push:
    tags:        
      - '*'

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust nightly
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- --default-toolchain nightly -y
        source $HOME/.cargo/env
    - name: Install clang-sys Dependencies
      run: sudo apt-get install -y clang llvm lld libclang-dev
    - name: Build
      run: cargo build --verbose

  static_build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust nightly
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- --default-toolchain nightly -y
        source $HOME/.cargo/env
    - name: Install clang-sys Dependencies
      run: sudo apt-get install -y clang llvm lld libclang-dev zip
    - name: Install muslc rust toolchain
      run: rustup target add x86_64-unknown-linux-musl
    - name: Build
      run: cargo build --release --target=x86_64-unknown-linux-musl
    - name: Create package
      run: |
        cp target/x86_64-unknown-linux-musl/release/atomrootfsinit .
        zip atomrootfsinit_v${{ env.RELEASE_VERSION }}_x86_64.zip atomrootfsinit
        rm atomrootfsinit
    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: static-package
        path: |
          *.zip
        if-no-files-found: error

  bookworm_build:
    runs-on: ubuntu-latest
    container: 
      image: debian:bookworm
      volumes:
        - /usr:/usr-host
        - /opt:/opt-host
      options: --privileged
    steps:
    - name: Maximize build space
      run: |
        df -h
        rm -rf /usr-host/share/dotnet
        rm -rf /usr-host/share/swift
        rm -rf /usr-host/share/java
        rm -rf /usr-host/local/lib/android
        rm -rf /opt-host/ghc
        rm -rf /opt-host/hostedtoolcache
        rm -rf /opt-host/az
        df -h
    - uses: actions/checkout@v4
    - name: Update system
      run: |
        apt-get update -y
        apt-get upgrade -y
    - name: Install Basic Software
      run: apt-get install -y sudo curl
    - name: Install Build Dependencies
      run: apt-get install -y build-essential devscripts debhelper
    - name: Install clang-sys Dependencies
      run: apt-get install -y clang llvm lld libclang-dev
    - name: Install Rust toolchain
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- --default-toolchain stable -y
    - name: Build deb
      run: |
        . $HOME/.cargo/env
        export PATH="$HOME/.cargo/bin:$PATH"
        cargo install cargo-deb
        cargo deb
    - name: Move debs
      run: |
        mv target/debian/*.deb .
        for file in *.deb; do mv "$file" "${file%.deb}.bookworm.deb"; done
    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: bookworm-package
        path: |
          *.deb
        if-no-files-found: error

  trixie_build:
    runs-on: ubuntu-latest
    container: 
      image: debian:trixie
      volumes:
        - /usr:/usr-host
        - /opt:/opt-host
      options: --privileged
    steps:
    - name: Maximize build space
      run: |
        df -h
        rm -rf /usr-host/share/dotnet
        rm -rf /usr-host/share/swift
        rm -rf /usr-host/share/java
        rm -rf /usr-host/local/lib/android
        rm -rf /opt-host/ghc
        rm -rf /opt-host/hostedtoolcache
        rm -rf /opt-host/az
        df -h
    - uses: actions/checkout@v4
    - name: Update system
      run: |
        apt-get update -y
        apt-get upgrade -y
    - name: Install Basic Software
      run: apt-get install -y sudo curl
    - name: Install Build Dependencies
      run: apt-get install -y build-essential devscripts debhelper
    - name: Install clang-sys Dependencies
      run: apt-get install -y clang llvm lld libclang-dev
    - name: Install Rust toolchain
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- --default-toolchain stable -y
    - name: Build deb
      run: |
        . $HOME/.cargo/env
        export PATH="$HOME/.cargo/bin:$PATH"
        cargo install cargo-deb
        cargo deb
    - name: Move debs
      run: |
        mv target/debian/*.deb .
        for file in *.deb; do mv "$file" "${file%.deb}.trixie.deb"; done
    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: trixie-package
        path: |
          *.deb
        if-no-files-found: error

  make-release:
    runs-on: ubuntu-latest
    needs: [prepare, static_build, bookworm_build, trixie_build]
    steps:
      - name: Download static artifacts
        uses: actions/download-artifact@v4
        with:
          name: static-package
          path: ${{ env.PKGDEST }}
      - name: Download debian bookworm artifacts
        uses: actions/download-artifact@v4
        with:
          name: bookworm-package
          path: ${{ env.PKGDEST }}
      - name: Download debian trixie artifacts
        uses: actions/download-artifact@v4
        with:
          name: trixie-package
          path: ${{ env.PKGDEST }}
      - name: Set env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Make release
        uses: softprops/action-gh-release@v2
        with:
          name: atomrootfsinit v${{ env.RELEASE_VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            *.zip
            *.deb